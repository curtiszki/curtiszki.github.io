<meta charset="utf-8">

<title>{{site.title}}</title>
{% seo %}
<meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
<meta http-equiv="cleartype" content="on">

<!-- Mobile Meta Tags -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">

<!-- Icons + Favicons -->
<link rel="shortcut icon" type="image/x-icon" href='/assets/icons/favicon.ico'>
<link rel="apple-touch-icon" sizes="180x180" href='/assets/icons/apple-touch-icon-180x180.png'>


<!-- font awesome -->

<link href='/vendor/css/font-awesome.css' rel="stylesheet">

<!-- import reset.css stylesheet -->

<link href='/vendor/css/reset.min.css' rel="stylesheet">

<!-- page's individual stylesheet -->

{% if page.css.size > 0 %}
<link href='/css/{{page.css}}.css' rel='stylesheet'>

{% else %}

<link href='/css/default.css' rel='stylesheet'>

{% endif %}

<!-- Google Fonts -->

<link href="https://fonts.googleapis.com/css?family=Catamaran|Ubuntu" rel="stylesheet">
