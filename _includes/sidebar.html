<div id="sidebar-mask"></div>

<!-- js for opening/closing nests -->
<script type="text/javascript" defer async>

  sidebarListeners();

  var sidebarSublists = document.getElementsByClassName('sidebar-internal-list');

  // iterate over all collected elements and add an open/close click listener

  for( i = 0; i < sidebarSublists.length; i++) {

    // use jekyll templated page variables to see if list item is pertinent to current page.
    var pageId = '{{page.id}}';

    sidebarSublists[i].addEventListener('click', function(e){

        if (this.classList.contains('is-open')) {

          this.classList.remove('is-open');

        } else {
          this.classList.add('is-open');
        }
    });

    if(sidebarSublists[i].getAttribute("id") == (pageId)) sidebarSublists[i].classList.add("current-page");

  }

  <!-- sidebar open/close listeners -->
  function sidebarListeners() {

    var body = document.getElementById('body'),
    content = document.getElementById('content-main');

    var sidebar = document.getElementById('sidebar');
    var sidebarOpen = document.getElementById('sidebar-hamburger-icon');
    var sidebarClose = document.getElementById('sidebar-close');
    var sidebarMask = document.getElementById('sidebar-mask');

    sidebarOpen.addEventListener('click', function(e){

      e.preventDefault();
      openSidebar();
    });

    sidebarClose.addEventListener('click', function(e){

      e.preventDefault();
      closeSidebar();
    });

    sidebarMask.addEventListener('click', function(e) {

      e.preventDefault();
      closeSidebar();
    });


    function closeSidebar() {

      body.classList.remove('sidebar-active');
      sidebar.classList.add('transitioning');
      sidebar.classList.remove('is-active');
      sidebarMask.classList.remove('is-active');
      content.style.right = '0px';

      setTimeout(function(){
        sidebar.classList.remove('transitioning');
      }, 1000);

    }

    function openSidebar() {

      sidebar.classList.add('is-active');
      body.classList.add('sidebar-active');
      sidebarMask.classList.add('is-active');
      content.style.right = sidebar.clientWidth+'px';
    }
  }
</script>
